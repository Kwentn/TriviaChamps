<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Time</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<!-- ============================================================
  FIREBASE SETUP
  1. Go to https://console.firebase.google.com
  2. Create a new project, click "Add app" > Web
  3. Copy your config and paste it below
  4. Go to Realtime Database > Create database (Test Mode)
  ============================================================ -->
<script type="module">
  import { DEFAULT_QUESTIONS } from "./questions.js";

  import { initializeApp }                              from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  // ↓↓↓ PASTE YOUR FIREBASE CONFIG HERE ↓↓↓
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT_ID.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  // ↑↑↑ PASTE YOUR FIREBASE CONFIG HERE ↑↑↑

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ---- App state ----
  let questions = JSON.parse(JSON.stringify(DEFAULT_QUESTIONS));
  let leaderboard = [];
  let currentQ  = 0;
  let score     = 0;
  let username  = "";
  let answered  = false;

  // ---- Firebase: questions ----
  async function loadQuestions() {
    try {
      const snap = await get(ref(db, "questions"));
      if (snap.exists()) {
        questions = snap.val();
      } else {
        await set(ref(db, "questions"), DEFAULT_QUESTIONS);
      }
    } catch (e) {
      console.warn("Could not load questions from Firebase, using local defaults:", e);
    }
  }

  // ---- Firebase: leaderboard ----
  function listenLeaderboard() {
    onValue(ref(db, "leaderboard"), (snap) => {
      if (snap.exists()) {
        leaderboard = Object.values(snap.val());
        leaderboard.sort((a, b) => b.score - a.score || a.name.localeCompare(b.name));
      } else {
        leaderboard = [];
      }
      renderLeaderboard();
    });
  }

  async function addToLeaderboard(entry) {
    await push(ref(db, "leaderboard"), entry);
  }

  async function clearLeaderboardInFirebase() {
    await remove(ref(db, "leaderboard"));
  }

  // ---- UI helpers ----
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById("screen-" + id).classList.add("active");
    if (id === "leaderboard") renderLeaderboard();
    if (id === "quiz") {
      setTimeout(() => document.getElementById("answer-input")?.focus(), 50);
    }
  }

  function escHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ---- Quiz ----
  function startQuiz() {
    username = document.getElementById("username-input").value.trim();
    if (!username) { alert("Please enter a username first!"); return; }
    currentQ = 0; score = 0; answered = false;
    showScreen("quiz");
    loadQuestion();
  }

  function loadQuestion() {
    answered = false;
    const q = questions[currentQ];
    document.getElementById("q-counter").textContent = `Question ${currentQ + 1} of ${questions.length}`;
    document.getElementById("q-text").textContent = q.q;
    document.getElementById("quiz-user").textContent = username;
    document.getElementById("progress-bar").style.width = `${(currentQ / questions.length) * 100}%`;
    document.getElementById("answer-input").value = "";
    document.getElementById("answer-input").disabled = false;
    document.getElementById("answer-input").className = "answer-input";
    document.getElementById("submit-btn").style.display = "flex";
    document.getElementById("next-btn").style.display = "none";
    document.getElementById("feedback-msg").className = "feedback-msg";
    document.getElementById("feedback-msg").textContent = "";
    setTimeout(() => document.getElementById("answer-input")?.focus(), 50);
  }

  function submitAnswer() {
    if (answered) return;
    const input = document.getElementById("answer-input");
    const typed = input.value.trim();
    if (!typed) return;
    answered = true;

    const q = questions[currentQ];
    const correct = q.answer.trim().toLowerCase();
    const isCorrect = typed.toLowerCase() === correct;

    input.disabled = true;
    const fb = document.getElementById("feedback-msg");

    if (isCorrect) {
      score++;
      input.className = "answer-input correct";
      fb.textContent = "Correct!";
      fb.className = "feedback-msg correct";
    } else {
      input.className = "answer-input wrong";
      fb.textContent = `Not quite — the answer was: ${q.answer}`;
      fb.className = "feedback-msg wrong";
    }

    document.getElementById("submit-btn").style.display = "none";

    if (currentQ < questions.length - 1) {
      document.getElementById("next-btn").style.display = "flex";
    } else {
      setTimeout(() => showResultsScreen(), 1000);
    }
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ < questions.length) loadQuestion();
    else showResultsScreen();
  }

  async function showResultsScreen() {
    document.getElementById("res-score").textContent = score;
    document.getElementById("res-total").textContent  = questions.length;
    const grades = [
      [questions.length,                  "🏆 Perfect score! Brilliant!"],
      [Math.ceil(questions.length * 0.8), "⭐ Excellent work!"],
      [Math.ceil(questions.length * 0.6), "👍 Good effort!"],
      [Math.ceil(questions.length * 0.4), "📚 Keep studying!"],
      [0,                                  "💪 Better luck next time!"]
    ];
    document.getElementById("res-grade").textContent = grades.find(g => score >= g[0])[1];
    const entry = { name: username, score, total: questions.length, date: new Date().toLocaleDateString() };
    try { await addToLeaderboard(entry); } catch(e) { console.warn("Could not save score:", e); }
    showScreen("results");
  }

  // ---- Leaderboard ----
  function renderLeaderboard() {
    const el = document.getElementById("lb-list");
    if (!el) return;
    if (!leaderboard.length) {
      el.innerHTML = '<p class="muted center">No scores yet — be the first!</p>';
      return;
    }
    const medals    = ["🥇","🥈","🥉"];
    const rankClass = ["gold","silver","bronze"];
    el.innerHTML = leaderboard.slice(0, 20).map((e, i) => `
      <div class="lb-row">
        <span class="lb-rank ${rankClass[i]||''}">${medals[i] || "#"+(i+1)}</span>
        <span class="lb-name">${escHtml(e.name)}${e.name === username ? '<span class="lb-you">you</span>' : ''}</span>
        <span class="lb-score">${e.score} / ${e.total}</span>
        <span class="lb-date">${e.date}</span>
      </div>`).join("");
  }

  async function clearLeaderboard() {
    if (!confirm("Clear ALL leaderboard scores? This cannot be undone.")) return;
    try {
      await clearLeaderboardInFirebase();
      leaderboard = [];
      renderLeaderboard();
    } catch(e) { alert("Error clearing leaderboard."); }
  }

  function resetToHome() { showScreen("home"); }

  // ---- Expose for inline handlers ----
  window._startQuiz      = startQuiz;
  window._submitAnswer   = submitAnswer;
  window._nextQuestion   = nextQuestion;
  window._showScreen     = showScreen;
  window._resetToHome    = resetToHome;
  window._clearLeaderboard = clearLeaderboard;

  // Enter key submits answer
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter") return;
    const quiz = document.getElementById("screen-quiz");
    if (!quiz.classList.contains("active")) return;
    if (!answered) submitAnswer();
    else if (document.getElementById("next-btn").style.display !== "none") nextQuestion();
  });

  // ---- Bootstrap ----
  await loadQuestions();
  listenLeaderboard();
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f3ef;
    --surface:  #ffffff;
    --surface2: #f0ede8;
    --border:   #e2ddd6;
    --accent:   #4f3ef5;
    --accent-h: #3b2dd4;
    --text:     #1c1b2e;
    --muted:    #7a7890;
    --green:    #1a7a4a;
    --green-bg: #eaf6f0;
    --red:      #c0392b;
    --red-bg:   #fdf0ee;
    --radius:   14px;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px 72px;
  }

  .app { width: 100%; max-width: 540px; }

  .screen { display: none; animation: fadeUp .3s ease; }
  .screen.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  h1 { font-size: 2.8rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1.05; margin-bottom: 10px; color: var(--text); }
  h2 { font-size: 1.4rem; font-weight: 700; color: var(--text); }
  .mono { font-family: 'DM Mono', monospace; }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  /* Text inputs */
  input[type="text"] {
    width: 100%;
    padding: 13px 16px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    outline: none;
    transition: border .2s, box-shadow .2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79,62,245,0.1);
  }
  input[type="text"]:disabled { opacity: .7; cursor: default; }

  /* Answer input states */
  .answer-input { font-size: 1rem; }
  .answer-input.correct {
    border-color: var(--green) !important;
    background: var(--green-bg) !important;
    color: var(--green);
  }
  .answer-input.wrong {
    border-color: var(--red) !important;
    background: var(--red-bg) !important;
    color: var(--red);
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 13px 24px; border-radius: 10px;
    font-family: 'Syne', sans-serif; font-size: .95rem; font-weight: 600;
    cursor: pointer; transition: all .18s; border: none; width: 100%; margin-top: 12px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover  { background: var(--accent-h); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(79,62,245,0.25); }
  .btn-primary:active { transform: translateY(0); box-shadow: none; }
  .btn-ghost { background: transparent; color: var(--muted); border: 1.5px solid var(--border); }
  .btn-ghost:hover { background: var(--surface2); color: var(--text); border-color: #c8c4bc; }
  .btn-sm { padding: 8px 16px; font-size: .85rem; width: auto; margin-top: 0; }
  .btn-danger { background: transparent; color: var(--red); border: 1.5px solid var(--border); }
  .btn-danger:hover { background: var(--red-bg); border-color: var(--red); }

  /* Home */
  .logo-pill {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: .78rem; font-weight: 700; color: var(--accent);
    letter-spacing: .1em; text-transform: uppercase;
    background: rgba(79,62,245,0.08);
    border: 1px solid rgba(79,62,245,0.18);
    border-radius: 99px; padding: 5px 12px;
    margin-bottom: 20px;
  }
  .logo-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }
  .tagline { color: var(--muted); font-size: .95rem; margin-bottom: 28px; line-height: 1.6; }
  .label { font-size: .75rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; }

  /* Progress */
  .progress-wrap { height: 3px; background: var(--border); border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width .4s ease; }

  /* Quiz top bar */
  .quiz-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .q-badge {
    font-family: 'DM Mono', monospace; font-size: .78rem;
    color: var(--muted); background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 6px;
  }

  /* Question */
  .q-text { font-size: 1.2rem; font-weight: 700; line-height: 1.5; margin-bottom: 20px; color: var(--text); }
  .input-label { font-size: .78rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }

  /* Feedback */
  .feedback-msg { padding: 10px 14px; border-radius: 8px; font-size: .9rem; font-weight: 600; margin-top: 12px; display: none; }
  .feedback-msg.correct { background: var(--green-bg); color: var(--green); display: block; border: 1px solid #b3dfc8; }
  .feedback-msg.wrong   { background: var(--red-bg);   color: var(--red);   display: block; border: 1px solid #f2c4be; }

  /* Results */
  .score-circle {
    width: 110px; height: 110px; border-radius: 50%;
    border: 3px solid var(--accent);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    margin: 0 auto 20px; background: rgba(79,62,245,0.05);
  }
  .score-num   { font-size: 2.2rem; font-weight: 800; color: var(--accent); line-height: 1; }
  .score-denom { font-size: .82rem; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .score-grade { font-size: 1.05rem; font-weight: 700; margin-bottom: 24px; text-align: center; color: var(--text); }

  /* Leaderboard */
  .lb-row { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 1px solid var(--border); }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { font-family: 'DM Mono', monospace; font-size: .82rem; color: var(--muted); min-width: 28px; font-weight: 500; }
  .lb-rank.gold   { color: #b8860b; }
  .lb-rank.silver { color: #777; }
  .lb-rank.bronze { color: #a0522d; }
  .lb-name  { flex: 1; font-weight: 600; font-size: .95rem; color: var(--text); }
  .lb-score { font-family: 'DM Mono', monospace; font-size: .88rem; color: var(--accent); font-weight: 500; }
  .lb-date  { font-size: .75rem; color: var(--muted); min-width: 60px; text-align: right; }
  .lb-you   { font-size: .68rem; background: var(--accent); color: #fff; padding: 2px 7px; border-radius: 4px; margin-left: 6px; }

  /* Misc */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }
  .muted   { color: var(--muted); font-size: .88rem; }
  .center  { text-align: center; }
  .nav-row { display: flex; gap: 8px; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .mt14    { margin-top: 14px; }
</style>
</head>
<body>
<div class="app">

  <!-- ========== HOME ========== -->
  <div class="screen active" id="screen-home">
    <div style="margin-bottom:32px">
      <div class="logo-pill"><span class="logo-dot"></span>Quiz Time</div>
      <h1>Think<br>Fast.</h1>
      <p class="tagline">Answer each question by typing your answer.<br>Climb the leaderboard.</p>
    </div>
    <div class="card">
      <div class="label">Your username</div>
      <input type="text" id="username-input" placeholder="e.g. QuizMaster99" maxlength="20"
        onkeydown="if(event.key==='Enter') window._startQuiz()">
      <button class="btn btn-primary" onclick="window._startQuiz()">Start Quiz →</button>
      <button class="btn btn-ghost" onclick="window._showScreen('leaderboard')">View Leaderboard</button>
    </div>
  </div>

  <!-- ========== QUIZ ========== -->
  <div class="screen" id="screen-quiz">
    <div class="quiz-bar">
      <span id="quiz-user" class="muted mono" style="font-size:.82rem"></span>
      <span id="q-counter" class="q-badge">Question 1 of 5</span>
    </div>
    <div class="progress-wrap">
      <div class="progress-fill" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="card">
      <div id="q-text" class="q-text"></div>
      <div class="input-label">Your answer</div>
      <input type="text" id="answer-input" class="answer-input" placeholder="Type your answer and press Enter…"
        onkeydown="if(event.key==='Enter') window._submitAnswer()">
      <div id="feedback-msg" class="feedback-msg"></div>
      <button class="btn btn-primary" id="submit-btn" onclick="window._submitAnswer()" style="margin-top:14px">
        Submit Answer
      </button>
      <button class="btn btn-ghost" id="next-btn" onclick="window._nextQuestion()" style="display:none;margin-top:14px">
        Next Question →
      </button>
    </div>
  </div>

  <!-- ========== RESULTS ========== -->
  <div class="screen" id="screen-results">
    <div class="card center">
      <div style="margin-bottom:8px;font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em">Your score</div>
      <div class="score-circle">
        <span class="score-num" id="res-score">0</span>
        <span class="score-denom">/ <span id="res-total">5</span></span>
      </div>
      <div class="score-grade" id="res-grade"></div>
      <button class="btn btn-primary" onclick="window._showScreen('leaderboard')">See Leaderboard →</button>
      <button class="btn btn-ghost" onclick="window._resetToHome()">Play Again</button>
    </div>
  </div>

  <!-- ========== LEADERBOARD ========== -->
  <div class="screen" id="screen-leaderboard">
    <div class="nav-row">
      <h2>Leaderboard</h2>
      <button class="btn btn-ghost btn-sm" onclick="window._resetToHome()">← Back</button>
    </div>
    <div class="card">
      <div id="lb-list"><p class="muted center">Loading scores…</p></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:14px">
      <button class="btn btn-ghost" onclick="window._resetToHome()">Play Again</button>
      <button class="btn btn-danger btn-sm" onclick="window._clearLeaderboard()" style="width:auto;flex-shrink:0">🗑 Clear</button>
    </div>
  </div>

</div>
</body>
</html>
